<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Palette Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">Project 01</p>
        <h1>Color Palette Generator</h1>
      </div>
      <button id="generateBtn">Generate Palette</button>
    </header>
    <section class="palette" id="palette"></section>
    <p class="hint">Click a color code to copy it. Use the lock button to keep colors while generating new ones.</p>
  </main>
  <script src="./script.js"></script>
</body>
</html>
